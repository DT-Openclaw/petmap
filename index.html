<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>迷雾遛狗地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        #app { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        #mapCanvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .top-bar .btns { display: flex; gap: 8px; }
        .top-bar button { padding: 6px 14px; background: rgba(255,255,255,0.15); border: none; border-radius: 20px; color: white; font-size: 13px; cursor: pointer; }
        .top-bar button:active { background: rgba(255,255,255,0.3); }
        .stats { display: flex; gap: 15px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 16px; font-weight: bold; color: #4CAF50; }
        .stat-label { font-size: 10px; opacity: 0.7; }
        
        .control-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; background: white; border-radius: 20px; padding: 15px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 12px; min-width: 260px; }
        .data-row { display: flex; gap: 15px; justify-content: center; }
        .data-item { text-align: center; }
        .data-value { font-size: 18px; font-weight: bold; color: #333; }
        .data-label { font-size: 10px; color: #888; }
        .btn-row { display: flex; gap: 8px; justify-content: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-start { background: #4CAF50; color: white; }
        .btn-pause { background: #FF9800; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn:disabled { opacity: 0.5; }
        
        .side-panel { position: fixed; top: 0; right: -280px; width: 280px; height: 100vh; background: white; z-index: 200; transition: right 0.3s; padding: 20px; overflow-y: auto; }
        .side-panel.open { right: 0; }
        .side-panel h2 { font-size: 16px; margin-bottom: 15px; }
        .side-panel label { display: block; margin: 12px 0 5px; font-size: 13px; color: #666; }
        .side-panel select, .side-panel input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .side-panel .btn { width: 100%; margin-top: 10px; }
        .close-btn { position: absolute; top: 12px; right: 15px; font-size: 24px; cursor: pointer; }
        
        .panel-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
        .panel-overlay.show { display: block; }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="mapCanvas"></canvas>
        <div class="top-bar">
            <div class="btns">
                <button onclick="toggleSidePanel()">⚙️ 设置</button>
                <button onclick="toggleTestMode()" id="testBtn">🧪 测试</button>
            </div>
            <div class="stats">
                <div class="stat-item"><span class="stat-value" id="explorePercent">0%</span><span class="stat-label">探索</span></div>
                <div class="stat-item"><span class="stat-value" id="totalWalks">0</span><span class="stat-label">次数</span></div>
                <div class="stat-item"><span class="stat-value" id="totalDistance">0km</span><span class="stat-label">里程</span></div>
            </div>
        </div>
        <div class="control-panel">
            <div class="data-row">
                <div class="data-item"><div class="data-value" id="distance">0.00</div><div class="data-label">公里</div></div>
                <div class="data-item"><div class="data-value" id="duration">00:00</div><div class="data-label">时长</div></div>
                <div class="data-item"><div class="data-value" id="speed">0.0</div><div class="data-label">km/h</div></div>
                <div class="data-item"><div class="data-value" id="calories">0</div><div class="data-label">千卡</div></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-start" id="startBtn" onclick="startWalk()">开始遛狗</button>
                <button class="btn btn-pause" id="pauseBtn" onclick="pauseWalk()" disabled>暂停</button>
                <button class="btn btn-stop" id="stopBtn" onclick="stopWalk()" disabled>结束</button>
            </div>
        </div>
    </div>
    
    <div class="panel-overlay" id="overlay" onclick="closeSidePanel()"></div>
    <div class="side-panel" id="sidePanel">
        <span class="close-btn" onclick="closeSidePanel()">×</span>
        <h2>设置</h2>
        <label>探索半径: <span id="radiusValue">30</span>米</label>
        <input type="range" min="20" max="50" value="30" id="exploreRadius" onchange="updateRadius(this.value)">
        <label>遛狗提醒</label>
        <input type="time" id="reminderTime">
        <button class="btn btn-start" onclick="setReminder()">设置提醒</button>
        <button class="btn" style="background:#666;color:white;margin-top:10px" onclick="toggleNightMode()">🌙 夜间模式</button>
        <button class="btn" style="background:#f44336;color:white;margin-top:10px" onclick="resetExplore()">重置探索进度</button>
    </div>

    <script>
        // ==================== 状态 ====================
        const STORAGE_KEYS = { EXPLORED: 'petmap_explored', HISTORY: 'petmap_history' };
        
        let canvas, ctx;
        let mapCenter = { lat: 39.9042, lng: 116.4074 };
        let mapZoom = 14;
        let path = [];
        let exploredAreas = [];
        let history = [];
        let isTracking = false, isPaused = false;
        let startTime = 0, pausedTime = 0;
        let testMode = false, testMarker = null;
        let exploreRadius = 30;
        let userMarker = { x: 0, y: 0 };
        
        // ==================== 初始化 ====================
        window.onload = function() {
            canvas = document.getElementById('mapCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 加载数据
            exploredAreas = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPLORED) || '[]');
            history = JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY) || '[]');
            updateStats();
            
            // 设置用户位置（屏幕中心）
            userMarker = { x: canvas.width/2, y: canvas.height/2 };
            
            // 初始探索
            exploreArea(mapCenter.lat, mapCenter.lng);
            
            // 点击地图
            canvas.addEventListener('click', handleMapClick);
            
            // 渲染
            render();
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            userMarker = { x: canvas.width/2, y: canvas.height/2 };
            render();
        }
        
        // ==================== 渲染 ====================
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 网格
            ctx.strokeStyle = 'rgba(76, 175, 80, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
            
            // 迷雾（未探索区域）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 挖空已探索区域
            ctx.globalCompositeOperation = 'destination-out';
            exploredAreas.forEach(area => {
                const pos = latLngToPixel(area.lat, area.lng);
                const r = area.radius * 3;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
            
            // 路径
            if (path.length > 1) {
                ctx.strokeStyle = '#4CAF50';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = '#4CAF50';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                const start = latLngToPixel(path[0].lat, path[0].lng);
                ctx.moveTo(start.x, start.y);
                for (let i = 1; i < path.length; i++) {
                    const p = latLngToPixel(path[i].lat, path[i].lng);
                    ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            
            // 用户/测试标记
            const pos = userMarker;
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 坐标显示
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '12px monospace';
            ctx.fillText(mapCenter.lat.toFixed(4) + ', ' + mapCenter.lng.toFixed(4), 10, canvas.height - 20);
            
            requestAnimationFrame(render);
        }
        
        function latLngToPixel(lat, lng) {
            const dx = (lng - mapCenter.lng) * 100 * Math.pow(2, mapZoom - 10);
            const dy = (lat - mapCenter.lat) * 80 * Math.pow(2, mapZoom - 10);
            return { x: canvas.width/2 - dx, y: canvas.height/2 + dy };
        }
        
        function pixelToLatLng(x, y) {
            const dx = (canvas.width/2 - x) / (100 * Math.pow(2, mapZoom - 10));
            const dy = (canvas.height/2 - y) / (80 * Math.pow(2, mapZoom - 10));
            return { lat: mapCenter.lat + dy, lng: mapCenter.lng + dx };
        }
        
        // ==================== 遛狗功能 ====================
        function startWalk() {
            if (!isTracking) {
                isTracking = true;
                isPaused = false;
                path = [{ lat: mapCenter.lat, lng: mapCenter.lng }];
                startTime = Date.now();
                pausedTime = 0;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('stopBtn').disabled = false;
                showMessage('开始遛狗 🐕');
                startTimer();
            }
        }
        
        function pauseWalk() {
            if (isTracking) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
            }
        }
        
        function stopWalk() {
            if (!isTracking) return;
            isTracking = false;
            
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const distance = calculateDistance();
            const speed = duration > 0 ? (distance/1000)/(duration/3600) : 0;
            const calories = Math.round(distance * 0.06);
            
            const record = { id: Date.now(), date: new Date().toLocaleString(), duration, distance, speed, calories, path };
            history.unshift(record);
            localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(history));
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '暂停';
            document.getElementById('stopBtn').disabled = true;
            
            updateStats();
            showMessage('遛狗完成！' + (distance/1000).toFixed(2) + 'km');
        }
        
        function calculateDistance() {
            if (path.length < 2) return 0;
            let total = 0;
            for (let i = 1; i < path.length; i++) {
                total += getDistance(path[i-1].lat, path[i-1].lng, path[i].lat, path[i].lng);
            }
            return total;
        }
        
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lng2-lng1) * Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        let timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!isTracking || isPaused) return;
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                document.getElementById('duration').textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
                
                const dist = calculateDistance();
                const speed = elapsed > 0 ? (dist/1000)/(elapsed/3600) : 0;
                document.getElementById('distance').textContent = (dist/1000).toFixed(2);
                document.getElementById('speed').textContent = speed.toFixed(1);
                document.getElementById('calories').textContent = Math.round(dist * 0.06);
            }, 1000);
        }
        
        // ==================== 测试模式 ====================
        function toggleTestMode() {
            const btn = document.getElementById('testBtn');
            if (!testMode) {
                testMode = true;
                btn.style.background = '#f44336';
                btn.textContent = '⏹ 停止';
                if (!isTracking) startWalk();
                showMessage('测试模式 - 点击地图移动');
            } else {
                testMode = false;
                btn.style.background = '';
                btn.textContent = '🧪 测试';
                showMessage('测试模式已停止');
            }
        }
        
        function handleMapClick(e) {
            if (!testMode) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const latlng = pixelToLatLng(x, y);
            
            mapCenter = latlng;
            userMarker = { x, y };
            
            if (isTracking && !isPaused) {
                path.push(latlng);
                exploreArea(latlng.lat, latlng.lng);
            }
            showMessage('移动到: ' + latlng.lat.toFixed(4) + ', ' + latlng.lng.toFixed(4));
        }
        
        function exploreArea(lat, lng) {
            const exists = exploredAreas.some(a => Math.abs(a.lat - lat) < 0.001 && Math.abs(a.lng - lng) < 0.001);
            if (!exists) {
                exploredAreas.push({ lat, lng, radius: exploreRadius });
                localStorage.setItem(STORAGE_KEYS.EXPLORED, JSON.stringify(exploredAreas));
                updateExplorePercent();
            }
        }
        
        function updateExplorePercent() {
            const totalArea = 50 * 1000000;
            const exploredArea = exploredAreas.length * Math.PI * Math.pow(exploreRadius * 3, 2);
            document.getElementById('explorePercent').textContent = Math.min(100, Math.round(exploredArea / totalArea * 100)) + '%';
        }
        
        // ==================== 侧边栏 ====================
        function toggleSidePanel() {
            document.getElementById('sidePanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }
        
        function closeSidePanel() {
            document.getElementById('sidePanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function updateRadius(val) {
            exploreRadius = parseInt(val);
            document.getElementById('radiusValue').textContent = val;
        }
        
        function resetExplore() {
            if (confirm('确定重置探索进度？')) {
                exploredAreas = [];
                localStorage.setItem(STORAGE_KEYS.EXPLORED, '[]');
                updateExplorePercent();
                showMessage('已重置');
            }
        }
        
        function setReminder() {
            showMessage('提醒已设置');
        }
        
        function toggleNightMode() {
            showMessage('已经是夜间模式');
        }
        
        function updateStats() {
            document.getElementById('totalWalks').textContent = history.length;
            const totalDist = history.reduce((s, h) => s + h.distance, 0);
            document.getElementById('totalDistance').textContent = (totalDist/1000).toFixed(1) + 'km';
            updateExplorePercent();
        }
        
        function showMessage(msg) {
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:15px 25px;border-radius:10px;z-index:3000;animation:fadeIn 0.3s;';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }
    </script>
</body>
</html>
